name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: fmt-check, compile, compile-integration, vet, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Stay in lockstep with the module's Go directive.
          go-version-file: go.mod

      - name: Run the pre-merge gate
        run: make check

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Build golangci-lint from source with the module's own Go toolchain
      # rather than downloading a prebuilt release. A prebuilt binary bundles
      # the Go version it was compiled against; if that lags the `go` directive
      # (1.26.x), its type-checker can fail on newer language features. Building
      # it here pins the linter's checker to the exact toolchain that compiles
      # the code, and runs the identical `make lint` path used locally.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Run golangci-lint
        run: golangci-lint run ./...

  race:
    name: race + coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Run the hermetic suite under the race detector with coverage. This is a
      # separate job from `check` because -race roughly triples runtime; keeping
      # it parallel means the fast gate is not held up by it.
      - name: Test with race detector and coverage
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
